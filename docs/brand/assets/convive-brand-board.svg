<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title description">
  <title id="title">Convive brand board</title>
  <desc id="description">A visual summary of the Convive logo, colour palette, and typography.</desc>
  <rect width="1600" height="1000" fill="#F7FAFD"/>
  <rect x="72" y="68" width="1456" height="820" rx="36" fill="#FFFFFF"/>

  <g transform="translate(86 100) scale(.82)">
    <text x="70" y="235" font-family="Trebuchet MS, Arial, sans-serif" font-size="210" font-weight="700" letter-spacing="-9">
      <tspan fill="#172B57">Con</tspan><tspan fill="#239DD1">v</tspan><tspan fill="#172B57">i</tspan><tspan fill="#239DD1">v</tspan><tspan fill="#172B57">e</tspan>
    </text>
    <path d="M480 255C516 294 567 314 623 314C679 314 730 294 766 255" stroke="#239DD1" stroke-width="13" stroke-linecap="round"/>
  </g>

  <text x="1010" y="205" fill="#172B57" font-family="Aptos Display, Aptos, Arial, sans-serif" font-size="38" font-weight="700">Two voices.</text>
  <text x="1010" y="255" fill="#172B57" font-family="Aptos Display, Aptos, Arial, sans-serif" font-size="38" font-weight="700">One continuous response.</text>
  <line x1="120" y1="420" x2="1480" y2="420" stroke="#DDE8F0" stroke-width="2"/>

  <text x="120" y="480" fill="#172B57" font-family="Aptos Display, Aptos, Arial, sans-serif" font-size="32" font-weight="700">Colour</text>
  <g font-family="Aptos, Arial, sans-serif">
    <rect x="120" y="515" width="230" height="130" rx="20" fill="#172B57"/>
    <text x="120" y="683" fill="#172B57" font-size="22" font-weight="700">Convive Navy</text>
    <text x="120" y="713" fill="#53647D" font-size="20">#172B57</text>
    <rect x="382" y="515" width="230" height="130" rx="20" fill="#239DD1"/>
    <text x="382" y="683" fill="#172B57" font-size="22" font-weight="700">Voice Blue</text>
    <text x="382" y="713" fill="#53647D" font-size="20">#239DD1</text>
    <rect x="644" y="515" width="230" height="130" rx="20" fill="#F7FAFD" stroke="#DDE8F0" stroke-width="2"/>
    <text x="644" y="683" fill="#172B57" font-size="22" font-weight="700">Soft Background</text>
    <text x="644" y="713" fill="#53647D" font-size="20">#F7FAFD</text>
    <rect x="906" y="515" width="230" height="130" rx="20" fill="#53647D"/>
    <text x="906" y="683" fill="#172B57" font-size="22" font-weight="700">Supporting Grey</text>
    <text x="906" y="713" fill="#53647D" font-size="20">#53647D</text>
  </g>

  <text x="1200" y="480" fill="#172B57" font-family="Aptos Display, Aptos, Arial, sans-serif" font-size="32" font-weight="700">Typography</text>
  <text x="1200" y="555" fill="#172B57" font-family="Trebuchet MS, Arial, sans-serif" font-size="42" font-weight="700">Trebuchet MS</text>
  <text x="1200" y="593" fill="#53647D" font-family="Aptos, Arial, sans-serif" font-size="19">Wordmark &#183; brand-led headings</text>
  <text x="1200" y="661" fill="#172B57" font-family="Aptos Display, Aptos, Arial, sans-serif" font-size="42" font-weight="700">Aptos</text>
  <text x="1200" y="699" fill="#53647D" font-family="Aptos, Arial, sans-serif" font-size="19">Presentations &#183; documents</text>
</svg>
